name: Contracts Tests

on:
  push:
    branches:
      - main
      - master
      - develop
      - ci/**
    paths:
      - Cargo.toml
      - Cargo.lock
      - contracts/**
      - .github/workflows/contracts-tests.yml
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - Cargo.toml
      - Cargo.lock
      - contracts/**
      - .github/workflows/contracts-tests.yml
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace

  changelog-check:
    name: Changelog Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md update
        run: |
          changed_contracts=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c "^contracts/" || true)
          changed_changelog=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c "^CHANGELOG\.md$" || true)

          if [ "$changed_contracts" -gt 0 ] && [ "$changed_changelog" -eq 0 ]; then
            echo "::error title=Missing CHANGELOG.md entry::PR modifies contracts/ but does not update CHANGELOG.md. Please document your changes in the Unreleased section."
            exit 1
          fi
