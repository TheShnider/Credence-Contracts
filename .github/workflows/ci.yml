# Credence-Contracts CI
# Single workflow to minimize merge conflicts; runs on every push and PR.
name: CI

on:
  push:
    branches: [main, master, develop, 'feature/**']
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --all-targets

      - name: Run bond property fuzz harness
        run: cargo test -p credence_bond fuzz::test_bond_fuzz -- --nocapture

  build-release:
    name: Build release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release (workspace)
        run: cargo build --release

  check-panics:
    name: Check for residual panics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup toolchain install nightly --profile minimal
          rustup default nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-expand-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Install cargo-expand
        run: cargo install cargo-expand || true

      - name: Check for panics in contracts
        run: |
          failed=0
          for dir in contracts/*; do
            if [ -d "$dir" ] && [ -f "$dir/Cargo.toml" ]; then
              echo "Checking $dir..."
              output=$(cd "$dir" && cargo expand --lib 2>/dev/null || true)
              if echo "$output" | grep -q "::core::panicking::panic"; then
                echo "Error: Found panic in $dir"
                echo "$output" | grep -C 2 "::core::panicking::panic"
                failed=1
              fi
            fi
          done
          exit $failed
